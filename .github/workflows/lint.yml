name: Lint

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Ruff and mypy
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --locked --extra dev --extra mcp

      - name: Check formatting
        run: uv run ruff format --check freecad_mcp_workbench tests InitGui.py

      - name: Run Ruff
        run: uv run ruff check freecad_mcp_workbench tests InitGui.py

      - name: Run mypy
        run: uv run mypy freecad_mcp_workbench tests InitGui.py
